# Travel Deal Scanner — Default Configuration
# Secrets are NEVER stored here — set them as environment variables:
#   export SERPAPI_KEY="your_key"   ← required for non-Ryanair flights
# No key needed for Ryanair (unofficial farefinder, no auth).

# ── Origins ────────────────────────────────────────────────────────────────────
origins:
  - GLA   # Glasgow International
  - EDI   # Edinburgh

# ── Departure time windows ─────────────────────────────────────────────────────
departure_windows:
  thursday_evening:
    enabled: true
    earliest: "17:00"
    latest: "23:59"
  friday_morning:
    enabled: true
    earliest: "00:00"
    latest: "11:00"

# ── Return window (always Sunday) ──────────────────────────────────────────────
return_window:
  day: sunday
  earliest: "17:00"
  latest: "23:59"

# ── Look-ahead search windows ──────────────────────────────────────────────────
search_windows:
  near_term:
    enabled: true
    weeks_from: 4
    weeks_to: 8
  long_term:
    enabled: true
    months_from: 3
    months_to: 6

# ── API settings (shared) ──────────────────────────────────────────────────────
api:
  max_stopovers: 2
  rate_limit_delay_seconds: 2   # pause between successive API calls
  max_retries: 3
  retry_backoff_base: 2
  results_per_call: 50

# ── SerpAPI — Google Travel Explore (all carriers except Ryanair) ─────────────
# Key read from env var SERPAPI_KEY. Free tier: 250 searches/month.
# Weekly scanning uses ~16/month — well within free tier.
serpapi:
  enabled: true   # set false to disable (e.g. if monthly quota exhausted)

# ── Ryanair farefinder (unofficial API — no key required) ─────────────────────
# Makes one call per Thu/Fri date in each search window. May occasionally
# return 403 if Ryanair blocks the request; errors are handled gracefully.
ryanair:
  enabled: true   # set false to disable Ryanair-specific calls

# ── Destination preferences (soft filtering + ranking) ─────────────────────────
destination_preferences:
  show_all: true           # false = only show preferred regions
  top_deals_count: 50      # max rows returned after scoring
  price_bucket_gbp: 5      # round price to nearest £5 for dedup ID
  max_price_gbp: 300
  min_price_gbp: 20

  preferred_regions:
    - name: "Southern Med"
      boost: 1.5
      countries: [ES, IT, PT, GR, HR, MT, TR]

    - name: "Canaries"
      boost: 1.3
      airports: [LPA, TFN, TFS, ACE, FUE, SPC]

    - name: "City Break"
      boost: 1.2
      cities: [BCN, MAD, FCO, CDG, AMS, LIS, PRG, BUD, VIE, KRK, WRO, ATH, DUB]

# ── Database ───────────────────────────────────────────────────────────────────
database:
  path: "data/deals.db"
  stale_after_days: 30

# ── Logging ────────────────────────────────────────────────────────────────────
logging:
  level: INFO
  file: "logs/scanner.log"
  max_bytes: 5242880   # 5 MB
  backup_count: 3
